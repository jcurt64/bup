<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BUUPP — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/prototype/styles.css"/>
  <style>
    :root { --sans: "DM Sans", -apple-system, system-ui, sans-serif; --serif: "Fraunces", Georgia, serif; --mono: "JetBrains Mono", ui-monospace, monospace; }
    body { background: var(--ivory); }
  </style>
</head>
<body data-palette="indigo">
  <div id="root"></div>

  <!-- Builds PRODUCTION de React : minifiés, sans les warnings/checks
       de dev → bundle plus léger et exécution plus rapide. (Babel
       standalone est déjà minifié.) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script>
    /* Cache-bust : `?v=...` hérité de l'URL de l'iframe (PrototypeFrame).
       C'est désormais un jeton STABLE par déploiement (PROTOTYPE_VERSION)
       et non plus un Date.now() par navigation : combiné au header
       `immutable` sur /prototype/components/* (next.config.ts), les .jsx
       restent en cache navigateur tant que le déploiement ne change pas,
       et sont re-fetchés au déploiement suivant (l'URL change).

       Chargement CONDITIONNEL par route : on ne charge plus les ~820 Ko
       de TOUS les composants à chaque ouverture, seulement ceux requis
       par la route courante. Ex. /prospect ne charge plus Pro.jsx
       (403 Ko) ni Landing.jsx. Une instance de shell.html ne sert qu'une
       route (les changements de section majeure passent par un reload
       complet via le parent PrototypeFrame), donc pas de risque de
       composant manquant après une navigation interne.

       Dépendances : Shell.jsx = primitives partagées (Logo/Icon/Avatar/
       ScoreGauge/Progress) requises partout ; Objectives.jsx définit
       Modal (utilisé par Prospect.jsx) et RechargeModal (utilisé par
       Pro.jsx). */
    (function () {
      var v = '';
      try { v = new URLSearchParams(window.location.search).get('v') || ''; } catch (e) {}
      if (!v) v = String(Date.now());

      var raw = (window.location.hash || '').replace('#', '').trim();
      var route = raw.split('?')[0];
      if (['landing','auth','prospect','pro','waitlist'].indexOf(route) === -1) {
        route = 'landing';
      }
      var byRoute = {
        landing:  ['Shell', 'Landing'],
        auth:     ['Shell', 'Auth'],
        prospect: ['Shell', 'Objectives', 'Prospect'],
        pro:      ['Shell', 'Objectives', 'Pro'],
        waitlist: []
      };
      var files = byRoute[route] || [];

      files.forEach(function (name) {
        var s = document.createElement('script');
        s.type = 'text/babel';
        s.src = '/prototype/components/' + name + '.jsx?v=' + encodeURIComponent(v);
        document.head.appendChild(s);
      });
    })();
  </script>

  <script type="text/babel" data-presets="react">
    function readRouteAndTab() {
      const raw = (window.location.hash || '').replace('#', '').trim();
      const [route, query] = raw.split('?');
      let tab = null;
      if (query) {
        const params = new URLSearchParams(query);
        tab = (params.get('tab') || '').trim() || null;
      }
      const safeRoute = ['landing','auth','prospect','pro','waitlist'].includes(route) ? route : 'landing';
      return { route: safeRoute, tab };
    }

    function App() {
      const initial = readRouteAndTab();
      const [route, setRoute] = React.useState(initial.route);
      const [initialTab, setInitialTab] = React.useState(initial.tab);

      React.useEffect(() => {
        const onHash = () => {
          const next = readRouteAndTab();
          setRoute(next.route);
          setInitialTab(next.tab);
        };
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      React.useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'instant' });
        try { window.parent && window.parent.postMessage({ bupp: 'route', route }, '*'); } catch (_) {}
      }, [route]);

      const go = (r) => {
        if (window.parent && window.parent !== window) {
          try { window.parent.postMessage({ bupp: 'goto', route: r }, '*'); return; } catch (_) {}
        }
        window.location.hash = r;
      };

      return (
        <>
          {route === 'landing' && <Landing go={go}/>}
          {route === 'auth' && <Auth go={go}/>}
          {route === 'prospect' && <ProspectDashboard go={go} initialTab={initialTab}/>}
          {route === 'pro' && <ProDashboard go={go}/>}
          {route === 'waitlist' && (
            <div style={{ position:'fixed', inset:0, background:'#080808', zIndex: 1 }}>
              <iframe src="/prototype/waitlist.html" title="Wait List" style={{ width:'100%', height:'100%', border:0, display:'block' }}/>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
